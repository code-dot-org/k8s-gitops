apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stress-argo-trace-crossplane
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups:
      - trace.stress.code.org
    resources:
      - stressmanagedthings
      - stressmanagedthings/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stress-argo-trace-crossplane
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: stress-argo-trace-crossplane
subjects:
  - kind: ServiceAccount
    name: crossplane
    namespace: crossplane-system

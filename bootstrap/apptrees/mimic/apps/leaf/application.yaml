apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mimic-leaf
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/code-dot-org/k8s-gitops.git
    targetRevision: main
    path: bootstrap/apptrees/mimic/apps/leaf/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: leaf
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

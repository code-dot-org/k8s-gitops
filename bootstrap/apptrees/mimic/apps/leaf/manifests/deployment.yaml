apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaf
  template:
    metadata:
      labels:
        app: leaf
    spec:
      terminationGracePeriodSeconds: 300
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -text=leaf
          ports:
            - containerPort: 5678
        - name: destroy-delay
          image: busybox:1.36
          command:
            - sh
            - -c
            - trap 'exit 0' TERM INT; while true; do sleep 3600; done
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 180

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mimic-app-of-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/code-dot-org/k8s-gitops.git
    targetRevision: main
    path: bootstrap/apptrees/mimic/apps/app-of-apps
    directory:
      include: app-of-apps.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

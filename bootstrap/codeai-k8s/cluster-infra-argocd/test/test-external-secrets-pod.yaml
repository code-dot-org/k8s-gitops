apiVersion: v1
kind: Pod
metadata:
  name: test-external-secrets-reader
  namespace: staging
spec:
  restartPolicy: Never
  containers:
    - name: reader
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          test -n "${CONTENTFUL_API_KEY:-}" &&
          test "${CONTENTFUL_API_KEY}" != "null" &&
          test -n "${FANIN_CONTENTFUL_API_KEY:-}" &&
          test "${FANIN_CONTENTFUL_API_KEY}" != "null" &&
          test -n "${DB_ENDPOINT_PROXY_READER_PORT:-}" &&
          test "${DB_ENDPOINT_PROXY_READER_PORT}" != "null"
      env:
        - name: CONTENTFUL_API_KEY
          valueFrom:
            secretKeyRef:
              name: addons-test-staging-secret
              key: contentful_api_key
        - name: FANIN_CONTENTFUL_API_KEY
          valueFrom:
            secretKeyRef:
              name: addons-test-staging-cdo-fan-in-secret
              key: contentful_api_key
        - name: DB_ENDPOINT_PROXY_READER_PORT
          valueFrom:
            secretKeyRef:
              name: addons-test-cfn-stack-staging-secret
              key: db_endpoint_proxy_reader_port

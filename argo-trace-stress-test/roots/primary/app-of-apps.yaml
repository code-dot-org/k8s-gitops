apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: stress-argo-trace-app-of-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    # Passthrough real Application files as-is. This mirrors the production
    # app-of-apps shape closely enough that root inference is exercised against
    # the same object kinds and ownership patterns.
    - git:
        repoURL: https://github.com/code-dot-org/k8s-gitops.git
        revision: seth/argo-trace-stress-test
        files:
          - path: argo-trace-stress-test/apps/primary/*/application.yaml
    # Wrap nested ApplicationSets in an Application so Argo owns both levels
    # and `argo-trace` has to recurse through app -> appset -> app.
    - git:
        repoURL: https://github.com/code-dot-org/k8s-gitops.git
        revision: seth/argo-trace-stress-test
        files:
          - path: argo-trace-stress-test/apps/primary/*/applicationset.yaml
        template:
          metadata:
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            destination:
              server: https://kubernetes.default.svc
              namespace: argocd
            source:
              repoURL: https://github.com/code-dot-org/k8s-gitops.git
              targetRevision: seth/argo-trace-stress-test
              path: 'argo-trace-stress-test/apps/primary/{{.path.basename}}'
              directory:
                include: applicationset.yaml
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - ServerSideApply=true
  template:
    metadata:
      name: '{{.metadata.name}}'
    spec:
      project: '{{if hasKey .spec "project"}}{{.spec.project}}{{else}}default{{end}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
  templatePatch: |
    {{- if or (hasKey .spec "source") (hasKey .spec "sources") }}
    metadata: {{ .metadata | toJson }}
    spec: {{ omit .spec "project" | toJson }}
    {{- end }}

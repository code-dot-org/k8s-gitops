apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stress-argo-trace-noisy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/code-dot-org/k8s-gitops.git
    targetRevision: seth/argo-trace-stress-test
    path: argo-trace-stress-test/apps/primary/nested/apps/noisy/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: stress-argo-trace-noisy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

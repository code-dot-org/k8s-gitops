apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: stress-argo-trace-broken-daemonset
spec:
  selector:
    matchLabels:
      app: stress-argo-trace-broken-daemonset
  template:
    metadata:
      labels:
        app: stress-argo-trace-broken-daemonset
    spec:
      containers:
        # This is the DaemonSet variant of the broken workload case. Large
        # clusters will have controllers beyond Deployment/ReplicaSet, and the
        # tracer should still bottom out in Pod state and events.
        - name: missing
          image: busybox:this-tag-does-not-exist
          command:
            - sh
            - -c
            - sleep 3600

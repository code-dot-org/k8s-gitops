apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stress-argo-trace-cluster-scope
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/code-dot-org/k8s-gitops.git
    targetRevision: main
    path: argo-trace-stress-test/apps/primary/cluster-scope/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

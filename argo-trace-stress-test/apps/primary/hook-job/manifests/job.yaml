apiVersion: batch/v1
kind: Job
metadata:
  name: stress-argo-trace-presync
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sleep
          image: busybox:1.36
          command:
            - sh
            - -c
            - sleep 180

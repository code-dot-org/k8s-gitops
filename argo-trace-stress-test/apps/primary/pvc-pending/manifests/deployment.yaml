apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-argo-trace-pvc-pending
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stress-argo-trace-pvc-pending
  template:
    metadata:
      labels:
        app: stress-argo-trace-pvc-pending
    spec:
      containers:
        - name: sleeper
          image: busybox:1.36
          command:
            - sh
            - -c
            - sleep 3600
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stress-argo-trace-pvc

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/code-dot-org/k8s-gitops.git
      targetRevision: main
      path: apps/argocd/chart
      helm:
        releaseName: argocd
        valueFiles:
          - $values/apps/infra/codeai-cluster-config.values.yaml
    # Keep the controller's cluster-scoped authority alive through the rest of
    # the self-delete. The upstream chart exposes wave annotations for the
    # controller StatefulSet and ServiceAccount through values, but not for the
    # controller ClusterRole or ClusterRoleBinding. This later source
    # intentionally overrides just those cluster-scoped RBAC objects so Argo
    # prunes them after the rest of the Argo app.
    - repoURL: https://github.com/code-dot-org/k8s-gitops.git
      targetRevision: main
      path: apps/argocd/controller-rbac-overrides
    - repoURL: https://github.com/code-dot-org/k8s-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true

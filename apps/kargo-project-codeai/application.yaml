apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-project-codeai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/code-dot-org/k8s-gitops.git
    targetRevision: main
    path: apps/kargo-project-codeai
    directory:
      recurse: true
      exclude: application.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kargo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # When we first bootstrap, Kargo installs its CRDs. We'll fail to load this project
    # (which uses them) until they are present. Thus, we'll retry 6 times, which will
    # give us about 2 minutes 30 seconds (exponential backoff starting at 5s) for Kargo
    # to get its CRDs full installed. ArgoCD sync waves would be a better way to handle
    # this, but they require both of us and kargo to be under the same parent application.yaml.
    retry:
      limit: 6
    syncOptions:
      - ServerSideApply=true
      # We depend on CRDs installed by kargo, so if this is the first bootstrap
      # we will expect to fail on the dry run (since the CRDs aren't installed yet)
      - SkipDryRunOnMissingResource=true

apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: review-infra-changes
  namespace: kargo-project-codeai
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: kargo-project-codeai
      sources:
        stages:
          - test
  promotionTemplate:
    spec:
      vars:
        - name: gitopsRepo
          value: https://github.com/code-dot-org/k8s-gitops.git
        - name: sourceRepo
          value: https://github.com/code-dot-org/code-dot-org.git
        - name: imageRepo
          value: ghcr.io/code-dot-org/code-dot-org
        - name: legacyEnv
          value: production
        - name: deployment
          value: production
        - name: envType
          value: production
        - name: namespace
          value: production
        - name: releaseName
          value: production
        - name: targetBranch
          value: stage/production
        - name: renderPath
          value: ./out/apps/codeai/deployments/production/deploy/manifests.yaml
      steps:
        - uses: git-clone
          as: gitops
          config:
            repoURL: ${{ vars.gitopsRepo }}
            checkout:
              - branch: main
                path: ./meta
                sparse:
                  - apps/codeai
              - branch: main
                path: ./gate
                sparse:
                  - warehouses/codeai/legacy-gitflow/production/merged
              - branch: ${{ vars.targetBranch }}
                as: production
                create: true
                path: ./out
        - uses: yaml-parse
          as: legacy-gate
          config:
            path: ./gate/warehouses/codeai/legacy-gitflow/${{ vars.legacyEnv }}/merged/${{ imageFrom(vars.imageRepo).Tag }}.yaml
            outputs:
              - name: revision
                fromExpression: revision
              - name: tag
                fromExpression: tag
              - name: mergedAt
                fromExpression: mergedAt
        - uses: git-clone
          config:
            repoURL: ${{ vars.sourceRepo }}
            checkout:
              - commit: ${{ commitFrom(vars.sourceRepo).ID }}
                path: ./src
                sparse:
                  - k8s/helm
        - uses: git-clear
          config:
            path: ./out
        - uses: yaml-update
          config:
            path: ./meta/apps/codeai/deployments/${{ vars.deployment }}/values.yaml
            updates:
              - key: image
                value: ${{ imageFrom(vars.imageRepo).RepoURL }}:${{ imageFrom(vars.imageRepo).Tag }}
        - uses: helm-template
          config:
            path: ./src/k8s/helm
            releaseName: ${{ vars.releaseName }}
            namespace: ${{ vars.namespace }}
            valuesFiles:
              - ./meta/apps/codeai/envTypes/${{ vars.envType }}.values.yaml
              - ./meta/apps/codeai/deployments/${{ vars.deployment }}/values.yaml
            outPath: ${{ vars.renderPath }}
        - uses: git-commit
          as: commit
          config:
            path: ./out
            message: |
              Render production for ${{ commitFrom(vars.sourceRepo).ID }} with ${{ imageFrom(vars.imageRepo).Tag }}
        - uses: git-push
          if: ${{ outputs.commit.commit != outputs.gitops.commits.production }}
          as: push
          config:
            path: ./out
            generateTargetBranch: true
        - uses: git-open-pr
          if: ${{ outputs.commit.commit != outputs.gitops.commits.production }}
          as: open-pr
          config:
            repoURL: ${{ vars.gitopsRepo }}
            sourceBranch: ${{ outputs.push.branch }}
            targetBranch: ${{ vars.targetBranch }}
            createTargetBranch: true
            title: Render production manifests for ${{ commitFrom(vars.sourceRepo).ID }}
            description: |
              Freight commit: ${{ commitFrom(vars.sourceRepo).ID }}
              Image tag: ${{ imageFrom(vars.imageRepo).Tag }}
        - uses: git-wait-for-pr
          if: ${{ outputs.commit.commit != outputs.gitops.commits.production }}
          config:
            repoURL: ${{ vars.gitopsRepo }}
            prNumber: ${{ outputs.open-pr.pr.id }}

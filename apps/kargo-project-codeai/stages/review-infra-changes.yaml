apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: review-infra-changes
  namespace: kargo-project-codeai
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: codeai-builds
      sources:
        stages:
          - levelbuilder
  vars:
    - name: gitopsRepo
      value: https://github.com/code-dot-org/k8s-gitops.git
    - name: renderDeployment
      value: production
    - name: renderPath
      value: apps/codeai/deployments/production/deploy
    - name: targetBranch
      value: stage/production
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          as: gitops
          config:
            repoURL: ${{ vars.gitopsRepo }}
            checkout:
              - commit: ${{ commitFrom(vars.gitopsRepo, warehouse('codeai-builds')).ID }}
                path: ./freight
                sparse:
                  - warehouses/codeai/builds/current.yaml
              - branch: main
                path: ./meta
                sparse:
                  - apps/codeai/deployments/production
                  - apps/codeai/envTypes
              - branch: ${{ vars.targetBranch }}
                create: true
                as: production
                path: ./out
                sparse:
                  - ${{ vars.renderPath }}
        - uses: yaml-parse
          as: build-lock
          config:
            path: ./freight/warehouses/codeai/builds/current.yaml
            outputs:
              - name: releaseId
                fromExpression: releaseId
              - name: gitCommit
                fromExpression: gitCommit
              - name: imageRef
                fromExpression: image.ref
              - name: imageDigest
                fromExpression: image.digest
              - name: sourceRepo
                fromExpression: packaging.sourceRepo
              - name: sourcePath
                fromExpression: packaging.sourcePath
        - uses: yaml-parse
          as: deployment-meta
          config:
            path: ./meta/apps/codeai/deployments/${{ vars.renderDeployment }}/deployment.yaml
            outputs:
              - name: envType
                fromExpression: envType
        - uses: git-clone
          config:
            repoURL: ${{ outputs['build-lock'].sourceRepo }}
            checkout:
              - commit: ${{ outputs['build-lock'].gitCommit }}
                path: ./src
                sparse:
                  - ${{ outputs['build-lock'].sourcePath }}
        - uses: git-clear
          config:
            path: ./out/${{ vars.renderPath }}
        - uses: helm-template
          config:
            path: ./src/${{ outputs['build-lock'].sourcePath }}
            outPath: ./out/${{ vars.renderPath }}
            outLayout: flat
            releaseName: ${{ vars.renderDeployment }}
            valuesFiles:
              - ./meta/apps/codeai/envTypes/${{ outputs['deployment-meta'].envType }}.values.yaml
              - ./meta/apps/codeai/deployments/${{ vars.renderDeployment }}/values.yaml
            setValues:
              - key: image
                value: ${{ outputs['build-lock'].imageRef }}@${{ outputs['build-lock'].imageDigest }}
                literal: true
        - uses: git-commit
          as: rendered-commit
          config:
            path: ./out
            message: Review ${{ vars.renderDeployment }} render for ${{ outputs['build-lock'].releaseId }}
        - uses: git-push
          if: ${{ outputs['rendered-commit'].commit != outputs['gitops'].commits['production'] }}
          as: push
          config:
            path: ./out
            generateTargetBranch: true
        - uses: git-open-pr
          if: ${{ outputs['rendered-commit'].commit != outputs['gitops'].commits['production'] }}
          as: open-pr
          config:
            repoURL: ${{ vars.gitopsRepo }}
            createTargetBranch: true
            sourceBranch: ${{ outputs.push.branch }}
            targetBranch: ${{ vars.targetBranch }}
            title: Review CodeAI ${{ vars.renderDeployment }} render for ${{ outputs['build-lock'].releaseId }}
        - uses: git-wait-for-pr
          if: ${{ outputs['rendered-commit'].commit != outputs['gitops'].commits['production'] }}
          as: wait-for-pr
          config:
            repoURL: ${{ vars.gitopsRepo }}
            prNumber: ${{ outputs['open-pr'].pr.id }}
        - uses: yaml-parse
          if: ${{ outputs['rendered-commit'].commit != outputs['gitops'].commits['production'] && !outputs['wait-for-pr'].pr.merged }}
          config:
            path: ./review-pr-must-be-merged.yaml
            outputs:
              - name: unreachable
                fromExpression: required

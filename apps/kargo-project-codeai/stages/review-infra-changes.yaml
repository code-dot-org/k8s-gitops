apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: review-infra-changes
  namespace: kargo-project-codeai
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: kargo-project-codeai
      sources:
        stages:
          - levelbuilder
  promotionTemplate:
    spec:
      vars:
        - name: gitopsRepo
          value: https://github.com/code-dot-org/k8s-gitops.git
        - name: renderedBranch
          value: stage/production
        - name: envType
          value: production
        - name: deployment
          value: production
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitopsRepo }}
            checkout:
              - commit: ${{ commitFrom(vars.gitopsRepo).ID }}
                path: ./freight
                sparse:
                  - warehouses/codeai/freight/current
              - branch: main
                path: ./meta
                sparse:
                  - apps/codeai
              - branch: ${{ vars.renderedBranch }}
                create: true
                path: ./out
        - uses: yaml-parse
          as: freight
          config:
            path: ./freight/warehouses/codeai/freight/current/freight.yaml
            outputs:
              - name: revision
                fromExpression: revision
              - name: releaseTag
                fromExpression: tag
              - name: packageType
                fromExpression: packageType
              - name: imageRef
                fromExpression: image.ref
        - uses: git-clear
          config:
            path: ./out
        - uses: helm-template
          config:
            path: ./freight/warehouses/codeai/freight/current/helm
            releaseName: ${{ vars.deployment }}
            valuesFiles:
              - ./meta/apps/codeai/envTypes/${{ vars.envType }}.values.yaml
              - ./meta/apps/codeai/deployments/${{ vars.deployment }}/values.yaml
            setValues:
              - key: image
                value: ${{ outputs['freight'].imageRef }}
            outPath: ./out/manifests.yaml
        - uses: git-commit
          config:
            path: ./out
            message: |
              Render production review from ${{ outputs['freight'].releaseTag }} [skip ci]
        - uses: git-push
          as: rendered-review
          config:
            path: ./out
            generateTargetBranch: true
        - uses: git-open-pr
          as: review-pr
          config:
            repoURL: ${{ vars.gitopsRepo }}
            provider: github
            createTargetBranch: true
            sourceBranch: ${{ outputs['rendered-review'].branch }}
            targetBranch: ${{ vars.renderedBranch }}
            title: Render production for ${{ outputs['freight'].releaseTag }}
            description: |
              Rendered production manifests for `${{ outputs['freight'].releaseTag }}` from `${{ outputs['freight'].revision }}`.
        - uses: git-wait-for-pr
          config:
            repoURL: ${{ vars.gitopsRepo }}
            provider: github
            prNumber: ${{ outputs['review-pr'].pr.id }}

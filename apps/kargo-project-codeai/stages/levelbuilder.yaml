apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: levelbuilder
  namespace: kargo-project-codeai
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: kargo-project-codeai
      sources:
        stages:
          - test
  promotionTemplate:
    spec:
      vars:
        - name: gitopsRepo
          value: https://github.com/code-dot-org/k8s-gitops.git
        - name: sourceRepo
          value: https://github.com/code-dot-org/code-dot-org.git
        - name: imageRepo
          value: ghcr.io/code-dot-org/code-dot-org
        - name: deployment
          value: levelbuilder
        - name: envType
          value: levelbuilder
        - name: namespace
          value: levelbuilder
        - name: releaseName
          value: levelbuilder
        - name: targetBranch
          value: stage/levelbuilder
        - name: renderPath
          value: ./out/apps/codeai/deployments/levelbuilder/deploy/manifests.yaml
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitopsRepo }}
            checkout:
              - branch: main
                path: ./meta
                sparse:
                  - apps/codeai
              - branch: ${{ vars.targetBranch }}
                create: true
                path: ./out
        - uses: git-clone
          config:
            repoURL: ${{ vars.sourceRepo }}
            checkout:
              - commit: ${{ commitFrom(vars.sourceRepo).ID }}
                path: ./src
                sparse:
                  - k8s/helm
        - uses: git-clear
          config:
            path: ./out
        - uses: yaml-update
          config:
            path: ./meta/apps/codeai/deployments/${{ vars.deployment }}/values.yaml
            updates:
              - key: image
                value: ${{ imageFrom(vars.imageRepo).RepoURL }}:${{ imageFrom(vars.imageRepo).Tag }}
        - uses: helm-template
          config:
            path: ./src/k8s/helm
            releaseName: ${{ vars.releaseName }}
            namespace: ${{ vars.namespace }}
            valuesFiles:
              - ./meta/apps/codeai/envTypes/${{ vars.envType }}.values.yaml
              - ./meta/apps/codeai/deployments/${{ vars.deployment }}/values.yaml
            outPath: ${{ vars.renderPath }}
        - uses: git-commit
          as: commit
          config:
            path: ./out
            message: |
              Render levelbuilder for ${{ commitFrom(vars.sourceRepo).ID }} with ${{ imageFrom(vars.imageRepo).Tag }}
        - uses: git-push
          config:
            path: ./out
            targetBranch: ${{ vars.targetBranch }}
        - uses: argocd-update
          config:
            apps:
              - name: codeai-levelbuilder
                sources:
                  - repoURL: ${{ vars.gitopsRepo }}
                    desiredRevision: ${{ outputs.commit.commit }}

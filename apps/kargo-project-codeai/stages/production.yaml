apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: production
  namespace: kargo-project-codeai
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: codeai-builds
      sources:
        stages:
          - review-infra-changes
  promotionTemplate:
    spec:
      vars:
        - name: gitopsRepo
          value: https://github.com/code-dot-org/k8s-gitops.git
        - name: legacyEnv
          value: production
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitopsRepo }}
            checkout:
              - commit: ${{ commitFrom('https://github.com/code-dot-org/k8s-gitops.git', warehouse('codeai-builds').ID) }}
                path: ./freight
              - branch: main
                path: ./gate
        - uses: yaml-parse
          as: build-lock
          config:
            path: ./freight/warehouses/codeai/builds/current.yaml
            outputs:
              - name: releaseId
                fromExpression: releaseId
              - name: gitCommit
                fromExpression: gitCommit
              - name: packagingKind
                fromExpression: packaging.kind
              - name: sourcePath
                fromExpression: packaging.sourcePath
        - uses: yaml-parse
          as: legacy-merge
          config:
            path: ./gate/warehouses/codeai/legacy-gitflow/${{ vars.legacyEnv }}/merged/${{ outputs['build-lock'].releaseId }}.yaml
            outputs:
              - name: revision
                fromExpression: revision
              - name: tag
                fromExpression: tag
              - name: mergedAt
                fromExpression: mergedAt
        - uses: git-merge-pr
          config:
            repoURL: https://github.com/code-dot-org/k8s-gitops.git
            prNumber: ${{ freightMetadata(ctx.targetFreight.name)['production-review-pr-id'] }}
            wait: true

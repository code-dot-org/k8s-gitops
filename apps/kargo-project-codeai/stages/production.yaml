apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: production
  namespace: kargo-project-codeai
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: codeai-image
      sources:
        stages:
          - review-infra-changes
  promotionTemplate:
    spec:
      vars:
        - name: gitopsRepo
          value: https://github.com/code-dot-org/k8s-gitops.git
        - name: imageRepo
          value: ghcr.io/code-dot-org/code-dot-org
        - name: capsuleRepo
          value: ghcr.io/code-dot-org/codeai-release-capsule
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitopsRepo }}
            checkout:
              - branch: main
                path: ./src
        - uses: yaml-parse
          as: legacy-gate
          config:
            path: ./src/warehouses/codeai/legacy-gitflow/production/merged/${{ imageFrom(vars.imageRepo).Tag }}.yaml
            outputs:
              - name: mergedTag
                fromExpression: tag
        - uses: set-metadata
          config:
            updates:
              - kind: Stage
                name: production
                values:
                  promotedImage:
                    repoURL: ${{ imageFrom(vars.imageRepo).RepoURL }}
                    tag: ${{ imageFrom(vars.imageRepo).Tag }}
                    digest: ${{ imageFrom(vars.imageRepo).Digest }}
                  capsule:
                    repoURL: ${{ vars.capsuleRepo }}
                    tag: ${{ imageFrom(vars.imageRepo).Tag }}

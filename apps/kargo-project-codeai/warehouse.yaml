apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: kargo-project-codeai
  namespace: kargo-project-codeai
spec:
  subscriptions:
    - image:
        repoURL: ghcr.io/code-dot-org/code-dot-org
        ignoreTagsRegexes:
          # Ignore single-platform images when we have a multiplatform option
          - '.*-amd64$'
          - '.*-arm64$'

apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: kargo-project-codeai
  namespace: kargo-project-codeai
spec:
  subscriptions:
    - git:
        repoURL: https://github.com/code-dot-org/code-dot-org.git
        branch: staging
        commitSelectionStrategy: NewestFromBranch
    - image:
        repoURL: ghcr.io/code-dot-org/code-dot-org
        imageSelectionStrategy: NewestBuild
        cacheByTag: true # our tags are immutable, caching is safe
        allowTagsRegexes:
          - '^git-[0-9a-f]{40}$' # :git-<full commit sha>
        ignoreTagsRegexes:
          # Ignore single-platform images when we have a multiplatform option
          - '.*-amd64$'
          - '.*-arm64$'
  freightCreationCriteria:
    expression: |
      imageFrom('ghcr.io/code-dot-org/code-dot-org').Tag ==
      'git-' + commitFrom('https://github.com/code-dot-org/code-dot-org.git').ID

{{- $externalDns := required "external-dns values are required" (index .Values "external-dns") -}}
{{- $externalDnsChart := index .Subcharts "external-dns" -}}
{{- $domainFilters := required "external-dns.domainFilters is required" (index $externalDns "domainFilters") -}}
{{- $zoneName := required "external-dns.domainFilters[0] is required" (first $domainFilters) -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: external-dns-wait-for-zone-drain-predelete
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      activeDeadlineSeconds: 900
      restartPolicy: Never
      serviceAccountName: {{ include "external-dns.serviceAccountName" (dict "Values" $externalDns "Chart" $externalDnsChart.Chart "Release" .Release) }}
      containers:
        - name: aws
          image: public.ecr.aws/aws-cli/aws-cli:latest
          command:
            - /bin/sh
            - -eu
            - -c
            - |
              zone_name="{{ $zoneName }}."
              hosted_zone_id=""

              for _ in $(seq 1 30); do
                hosted_zone_id="$(
                  aws route53 list-hosted-zones-by-name \
                    --dns-name "$zone_name" \
                    --query "HostedZones[?Name=='$zone_name']|[0].Id" \
                    --output text \
                  | sed 's#.*/##'
                )"
                if [ -n "$hosted_zone_id" ] && [ "$hosted_zone_id" != "None" ]; then
                  break
                fi
                echo "external-dns-predelete: waiting for hosted zone ${zone_name}"
                sleep 5
              done

              if [ -z "$hosted_zone_id" ] || [ "$hosted_zone_id" = "None" ]; then
                echo "external-dns-predelete: hosted zone ${zone_name} not found"
                exit 1
              fi

              echo "external-dns-predelete: watching hosted zone ${zone_name} (${hosted_zone_id}) for non-NS/SOA records"

              for _ in $(seq 1 90); do
                remaining_records="$(
                  aws route53 list-resource-record-sets \
                    --hosted-zone-id "$hosted_zone_id" \
                    --query 'ResourceRecordSets[?Type!=`NS` && Type!=`SOA`].[Name,Type]' \
                    --output text
                )"
                if [ -z "$remaining_records" ]; then
                  echo "external-dns-predelete: hosted zone ${zone_name} drained"
                  exit 0
                fi

                echo "external-dns-predelete: still waiting for hosted zone ${zone_name} to drain"
                echo "$remaining_records"
                sleep 10
              done

              echo "external-dns-predelete: timed out waiting for hosted zone ${zone_name} to drain"
              exit 1

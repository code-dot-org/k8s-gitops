provider: aws

codeai_cluster_config:
  cluster_name:
  iam_arn_prefix:

external-dns:
  provider:
    name: aws

  # The chart default is upsert-only, which leaves Route53 records behind on
  # app teardown and wedges hosted-zone deletion during destroy.
  policy: sync

  txtOwnerId: codeai-k8s

  sources:
    - service
    - ingress
    - crd
    # EKS Auto Mode does not yet support the Gateway path we were using here.
    # - gateway-httproute
    # - gateway-grpcroute

  domainFilters:
    - k8s.code.org

  serviceAccount:
    create: false
    name: external-dns-sa

  extraArgs:
    - --aws-zone-type=public
    - --fqdn-template={{ printf "{{ with index .Labels %q }}{{ . }}{{ else }}ignore{{ end }}" "code.ai/dns-name" }}.k8s.code.org
    - --exclude-domains=ignore.k8s.code.org

apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-postdelete-sleep
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sleep
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "external-dns-delete-delay: sleeping for {{ .Values.sleepSeconds }}s before finishing delete"
              sleep {{ .Values.sleepSeconds }}
              echo "external-dns-delete-delay: finished delete delay"

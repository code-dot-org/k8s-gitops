{{- $config := required "codeai_cluster_config is required" (index .Values "codeai_cluster_config") -}}
{{- $iamArnPrefix := required "codeai_cluster_config.iam_arn_prefix is required" (index $config "iam_arn_prefix") -}}
{{- $clusterName := required "codeai_cluster_config.cluster_name is required" (index $config "cluster_name") -}}
{{- if .Values.adhoc.enabled }}
{{ include "eso-per-envtype.render" (dict
  "environment_type" .Values.adhoc.environment_type
  "single_namespace_environment_type" false
  "multi_namespace_regexes" .Values.adhoc.multi_namespace_regexes
  "iam_role_arn" (printf "%s:role/%s-eso-%s" $iamArnPrefix $clusterName .Values.adhoc.environment_type)
  "region" .Values.codeai_cluster_config.cluster_region
) | trim }}
{{- end }}

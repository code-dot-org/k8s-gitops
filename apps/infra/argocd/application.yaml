apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  # Intentionally no resources finalizer here.
  # We want this child Application CR to disappear from the app-of-apps tree
  # without Argo trying to cascade-delete its own control plane.
  # Final teardown of the Argo install is owned by the bootstrap Helm release in
  # code-dot-org/k8s/tofu/codeai-k8s/cluster-infra-argocd/argocd-bootstrap.tf.
spec:
  project: default
  sources:
    - repoURL: https://github.com/code-dot-org/k8s-gitops.git
      targetRevision: main
      path: apps/infra/argocd/chart
      helm:
        releaseName: argocd
        valueFiles:
          - $values/apps/infra/codeai-cluster-config.values.yaml
    - repoURL: https://github.com/code-dot-org/k8s-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true

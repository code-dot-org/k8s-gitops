apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://github.com/code-dot-org/k8s-gitops.git
      targetRevision: main
      path: apps/infra/argocd/chart
      helm:
        releaseName: argocd
        valueFiles:
          - $values/apps/infra/codeai-cluster-config.values.yaml
    # Keep the controller RBAC alive through the rest of the self-delete.
    # The upstream chart exposes wave annotations for the controller StatefulSet
    # and ServiceAccount through values, but not for the controller Role or
    # ClusterRole bindings. This later source intentionally overrides just
    # those RBAC objects so Argo prunes them after the rest of the Argo app.
    - repoURL: https://github.com/code-dot-org/k8s-gitops.git
      targetRevision: main
      path: apps/infra/argocd/controller-rbac-overrides
    - repoURL: https://github.com/code-dot-org/k8s-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true

{{- if not (hasKey .Values "_bootstrap") }}
# This is an ArgoCD post-delete hook, it runs when Argo tries to delete it's own
# app during destroy. This hook deletes the ingress from ArgoCD to prevent
# a stuck situation later in argocd-bootstrap.tf.
#
# ISSUE: argo-bootstrap.tf wedges upon deleting ingress/argocd-server and times out
# 1. when we install argo initially via `helm_release`, it doesn't require networking for Argo core itself
# 2. but then we later install networking, and that brings in the shared ingress machinery, including a default ingress class, `aws-alb`
# 3. then we restart Argo at the end of the Tofu install
# 4. the exact Argo k8s object is `Ingress/argocd-server` in namespace `argocd`
# 5. that ingress is what makes `https://argocd.k8s.code.org` work, and it leads to AWS-side load balancer objects and finalizers
# 6. the observed live `Ingress/argocd-server` manifest now has `spec.ingressClassName: aws-alb`
# 7. when we go to delete, we tear down `networking` as part of the app-of-apps uninstall, leaving `Ingress/argocd-server` stuck with provider-owned finalizers
# 8. this leaves that Argo ingress path with finalizers that can no longer complete:
#    the ingress can still depend on AWS cleanup that needs the ingress machinery alive to finish
# 9. therefore when we get to `argocd-bootstrap.tf`, Helm hangs on removing the `helm_release.argocd_bootstrap` and times out
#
# Conclusion: to be deleted, Argo must not have the networking ingress class `aws-alb` on it at time of delete.

{{ $argocd := dict "Values" (index .Values "argo-cd") "Release" .Release "Chart" (dict "Name" "argo-cd") }}
{{ $namespace := include "argo-cd.namespace" $argocd }}
{{ $fullname := include "argo-cd.server.fullname" $argocd }}

apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullname }}-remove-ingress-postdelete
  namespace: {{ $namespace }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
    # This is a named hook Job, so Argo must delete any prior instance before
    # trying to create it again on a later delete pass.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "argo-cd.controller.serviceAccountName" $argocd }}
      containers:
        - name: kubectl
          # Intentionally unpinned: tiny public kubectl images with a shell are
          # hard to find, and kubectl version compatibility is usually excellent.
          image: cgr.dev/chainguard/kubectl:latest-dev
          command:
            - /bin/sh
            - -c
            - |
              set -e

              emit_event() {
                reason="$1"
                message="$2"

                echo "${message}"

                cat <<EOF | kubectl create -f - >/dev/null 2>&1 || true
              apiVersion: v1
              kind: Event
              metadata:
                generateName: {{ $fullname }}-remove-ingress-postdelete-
                namespace: {{ $namespace }}
              involvedObject:
                apiVersion: networking.k8s.io/v1
                kind: Ingress
                name: {{ $fullname }}
                namespace: {{ $namespace }}
              reason: ${reason}
              message: ${message}
              type: Normal
              source:
                component: argocd-remove-ingress-postdelete
              EOF
              }

              emit_event DeleteStarted "argocd-remove-ingress-postdelete: deleting ingress/{{ $fullname }} in namespace {{ $namespace }}"
              kubectl -n {{ $namespace }} delete ingress/{{ $fullname }} --ignore-not-found
              if kubectl -n {{ $namespace }} wait --for=delete ingress/{{ $fullname }} --timeout=-1s; then
                emit_event DeleteSucceeded "argocd-remove-ingress-postdelete: deleted ingress/{{ $fullname }} in namespace {{ $namespace }}"
              else
                emit_event DeleteTimedOut "argocd-remove-ingress-postdelete: timed out waiting for ingress/{{ $fullname }} deletion in namespace {{ $namespace }}"
                exit 1
              fi
{{- end }}

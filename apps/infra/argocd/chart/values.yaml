argo-cd:
  crds:
    install: true

  global:
    domain: argocd.k8s.code.org

  dex:
    enabled: false

  configs:
    params:
      # TLS terminates at the ALB, so argocd-server should speak plain HTTP to the ingress backend.
      server.insecure: true

      # New globs differentiate * and ** in paths, etc, very useful and we require it
      applicationsetcontroller.enable.new.git.file.globbing: true

      # Progressive Syncs are alpha and must be explicitly enabled.
      applicationsetcontroller.enable.progressive.syncs: "true"

      # We raised the repo-server RPC and git request timeouts after
      # codeai-staging/codeai-test hit:
      #   ComparisonError: Failed to load target state: failed to generate
      #   manifest for source 1 of 2: rpc error: code = DeadlineExceeded
      #   desc = context deadline exceeded
      # The RPC defaults are 60s. The git request timeout defaults to 15s.
      server.repo.server.timeout.seconds: "300"
      controller.repo.server.timeout.seconds: "300"
      reposerver.git.request.timeout: "300s"
    cm:
      url: https://argocd.k8s.code.org

      # Add custom health checks that give ArgoCD better health insight into
      # various kinds of custom objects, particularly crossplane, argo projects
      # themselves, and our own custom releases.
      resource.customizations: |
        # Source: https://docs.crossplane.io/latest/guides/crossplane-with-argo-cd/#set-health-status
        "*.upbound.io/*":
          health.lua: |
            health_status = {
              status = "Progressing",
              message = "Provisioning ..."
            }

            local function contains (table, val)
              for i, v in ipairs(table) do
                if v == val then
                  return true
                end
              end
              return false
            end

            local has_no_status = {
              "ClusterProviderConfig",
              "ProviderConfig",
              "ProviderConfigUsage"
            }

            if obj.status == nil or next(obj.status) == nil and contains(has_no_status, obj.kind) then
              health_status.status = "Healthy"
              health_status.message = "Resource is up-to-date."
              return health_status
            end

            if obj.status == nil or next(obj.status) == nil or obj.status.conditions == nil then
              if (obj.kind == "ProviderConfig" or obj.kind == "ClusterProviderConfig") and obj.status.users ~= nil then
                health_status.status = "Healthy"
                health_status.message = "Resource is in use."
                return health_status
              end
              return health_status
            end

            for i, condition in ipairs(obj.status.conditions) do
              if condition.type == "LastAsyncOperation" then
                if condition.status == "False" then
                  health_status.status = "Degraded"
                  health_status.message = condition.message
                  return health_status
                end
              end

              if condition.type == "Synced" then
                if condition.status == "False" then
                  health_status.status = "Degraded"
                  health_status.message = condition.message
                  return health_status
                end
              end

              if condition.type == "Ready" then
                if condition.status == "True" then
                  health_status.status = "Healthy"
                  health_status.message = "Resource is up-to-date."
                end
              end
            end

            return health_status

        # Source: https://docs.crossplane.io/latest/guides/crossplane-with-argo-cd/#set-health-status
        "*.crossplane.io/*":
          health.lua: |
            health_status = {
              status = "Progressing",
              message = "Provisioning ..."
            }

            local function contains (table, val)
              for i, v in ipairs(table) do
                if v == val then
                  return true
                end
              end
              return false
            end

            local has_no_status = {
              "Composition",
              "CompositionRevision",
              "DeploymentRuntimeConfig",
              "ClusterProviderConfig",
              "ProviderConfig",
              "ProviderConfigUsage"
            }
            if obj.status == nil or next(obj.status) == nil and contains(has_no_status, obj.kind) then
                health_status.status = "Healthy"
                health_status.message = "Resource is up-to-date."
              return health_status
            end

            if obj.status == nil or next(obj.status) == nil or obj.status.conditions == nil then
              if (obj.kind == "ProviderConfig" or obj.kind == "ClusterProviderConfig") and obj.status.users ~= nil then
                health_status.status = "Healthy"
                health_status.message = "Resource is in use."
                return health_status
              end
              return health_status
            end

            for i, condition in ipairs(obj.status.conditions) do
              if condition.type == "LastAsyncOperation" then
                if condition.status == "False" then
                  health_status.status = "Degraded"
                  health_status.message = condition.message
                  return health_status
                end
              end

              if condition.type == "Synced" then
                if condition.status == "False" then
                  health_status.status = "Degraded"
                  health_status.message = condition.message
                  return health_status
                end
              end

              if contains({"Ready", "Healthy", "Offered", "Established", "ValidPipeline", "RevisionHealthy"}, condition.type) then
                if condition.status == "True" then
                  health_status.status = "Healthy"
                  health_status.message = "Resource is up-to-date."
                end
              end
            end

            return health_status

        # For our own custom XRs under *.code.org/* to show Health properly
        # Distilled from: https://docs.crossplane.io/latest/guides/crossplane-with-argo-cd/#set-health-status
        "*.code.org/*":
          health.lua: |
            health_status = {
              status = "Progressing",
              message = "Waiting for Ready condition",
            }

            for _, condition in ipairs(obj.status and obj.status.conditions or {}) do
              if condition.type == "LastAsyncOperation" and condition.status == "False" then
                return {
                  status = "Degraded",
                  message = condition.message or "",
                }
              end

              if condition.type == "Synced" and condition.status == "False" then
                return {
                  status = "Degraded",
                  message = condition.message or "",
                }
              end

              if condition.type == "Ready" then
                health_status.status = ({ True = "Healthy", False = "Progressing" })[condition.status] or "Progressing"
                health_status.message = condition.message or ""
                return health_status
              end
            end

            return health_status

      # Distilled from Kargo Project condition semantics:
      # https://github.com/akuity/kargo/blob/main/api/v1alpha1/conditions.go#L8-L40
      # https://github.com/akuity/kargo/blob/main/pkg/controller/management/projects/projects.go#L470-L574
      resource.customizations.health.kargo.akuity.io_Project: |
        for _, condition in ipairs(obj.status and obj.status.conditions or {}) do
          if condition.type == "Stalled" and condition.status == "True" then
            return {
              status = "Degraded",
              message = condition.message or "",
            }
          end
        end

        for _, condition in ipairs(obj.status and obj.status.conditions or {}) do
          if condition.type == "Reconciling" and condition.status == "True" then
            return {
              status = "Progressing",
              message = condition.message or "",
            }
          end
        end

        for _, condition in ipairs(obj.status and obj.status.conditions or {}) do
          if condition.type == "Ready" then
            return {
              status = ({ True = "Healthy", False = "Degraded" })[condition.status] or "Progressing",
              message = condition.message or "",
            }
          end
        end

        return { status = "Progressing", message = "Waiting for Ready condition" }

      # Source: https://argo-cd.readthedocs.io/en/release-3.1/operator-manual/health/#argocd-app
      # Uses the documented argoproj.io/Application health check verbatim,
      # with a local codeai-* empty-resource override ahead of it.
      resource.customizations.health.argoproj.io_Application: |
        -- codeai apps are considered unhealthy if they have no resources
        if string.match(obj.metadata.name, "^codeai%-") and #((obj.status and obj.status.resources) or {}) == 0 then
          return {
            status = "Degraded",
            message = obj.status and obj.status.operationState and obj.status.operationState.message or "CodeAI application has no resources",
          }
        end

        -- Verbatim upstream Application health check from Argo CD docs:
        -- https://argo-cd.readthedocs.io/en/release-3.1/operator-manual/health/#argocd-app
        hs = {}
        hs.status = "Progressing"
        hs.message = ""
        if obj.status ~= nil then
          if obj.status.health ~= nil then
            hs.status = obj.status.health.status
            if obj.status.health.message ~= nil then
              hs.message = obj.status.health.message
            end
          end
        end
        return hs

      # Source: https://docs.crossplane.io/latest/guides/crossplane-with-argo-cd/#set-resource-tracking-method
      # Crossplane recommends annotation-based tracking so Argo CD does not rely on instance labels.
      application.resourceTrackingMethod: annotation

      # Source: https://docs.crossplane.io/latest/guides/crossplane-with-argo-cd/#set-resource-exclusion
      # Exclude Crossplane's controller-generated ProviderConfigUsage bookkeeping objects from Argo CD,
      # because they are internal finalizer/relationship objects and add noisy load to the Argo CD UI.
      resource.exclusions: |
        - apiGroups:
          - "*"
          kinds:
          - ProviderConfigUsage

      # BREAK GLASS FOR EMERGENCY ARGOCD ADMIN LOGIN (if Google SSO has failed):
      # 1. set `admin.enabled: true` below
      # 2. deploy cluster-infra-argocd
      # 3. emergency login to Argo CD with:
      #    Username: admin
      #    Password: run `kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 --decode; echo`
      #
      # TO CLEANUP AFTER EMERGENCY (SSO working again):
      # 1. set `admin.enabled: false` below
      # 2. deploy cluster-infra-argocd
      # 3. run to delete temporary plaintext admin secrets:
      #    `kubectl -n argocd patch secret argocd-secret --type='json' -p='[{"op":"remove","path":"/data/admin.password"},{"op":"remove","path":"/data/admin.passwordMtime"}]' && kubectl -n argocd delete secret argocd-initial-admin-secret --ignore-not-found`
      #
      # admin.enabled=true causes the chart to generate a plaintext password admin login.
      # We use Google SSO with google group roles infrastructure@code.org etc mapped to admin.
      admin.enabled: false
      oidc.config: |
        name: Dex
        issuer: https://dex.k8s.code.org
        clientID: argocd
        clientSecret: $dex.argocd.clientSecret
        requestedScopes:
          - openid
          - profile
          - email
          - groups
    rbac:
      policy.csv: |
        g, all@code.org, role:readonly
        g, trusted-contributors@code.org, role:readonly
        g, product@code.org, role:readonly
        g, engineers@code.org, role:admin
        g, infrastructure@code.org, role:admin

  server:
    ingress:
      enabled: true
      controller: generic
      hostname: argocd.k8s.code.org
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
        alb.ingress.kubernetes.io/ssl-redirect: "443"
        alb.ingress.kubernetes.io/backend-protocol: HTTP

  controller:
    env:
      # crossplane docs recommend bumping client qps to 300 for ArgoCD to avoid
      # sluggishness on clusters with lots of CRDs (which crossplane brings)
      #
      # see: https://docs.crossplane.io/latest/guides/crossplane-with-argo-cd/
      - name: ARGOCD_K8S_CLIENT_QPS
        value: "300"
    resources:
      # TODO: this request/limit was randomly set by Codex when it noticed Fargate
      # OOM killing our pod. It just copied repoServer which WAS set via
      # benchmarking, but its a totally different task. We should profile the
      # correct size for this instance.
      requests:
        cpu: 1000m
        memory: 4Gi
      limits:
        cpu: 1000m
        memory: 4Gi

  repoServer:
    env:
      # `git fetch` is shelled out through repo-server's exec path in Argo CD
      # v3.3.4, so raise the 90s default exec timeout too for our heavy monorepo.
      - name: ARGOCD_EXEC_TIMEOUT
        value: 600s
    resources:
      requests:
        cpu: 1000m
        memory: 4Gi
        ephemeral-storage: 100Gi
      limits:
        cpu: 1000m
        memory: 4Gi
        ephemeral-storage: 100Gi

  # Self-managed Argo can repeatedly resume argocd-redis-secret-init even
  # after the Job completed. The bootstrap helm_release in
  # cluster-infra-argocd/argocd-bootstrap.tf forces this on once for blank
  # clusters; keep it off here for steady-state self-management.
  #
  # See upstream issue: https://github.com/argoproj/argo-helm/issues/2887
  redisSecretInit:
    enabled: false

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: after-argocd-delay-pod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Hold destroy just before the argocd wave so we can observe whether the
    # argocd-server ingress still exists at delete start and 5 minutes later.
    argocd.argoproj.io/sync-wave: "23"
spec:
  project: default
  source:
    repoURL: https://github.com/code-dot-org/k8s-gitops.git
    targetRevision: main
    path: apps/infra/after-argocd-delay-pod/chart
    helm:
      releaseName: after-argocd-delay-pod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

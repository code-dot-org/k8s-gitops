apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oidc-client-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    kind: SecretStore
    name: argocd-secret-store
  target:
    name: oidc-client-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: ARGOCD_CLIENT_SECRET
      remoteRef:
        key: argocd-secret
        property: dex.argocd.clientSecret

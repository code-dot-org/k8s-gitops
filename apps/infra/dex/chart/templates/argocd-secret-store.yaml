apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: argocd-secret-store
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    kubernetes:
      remoteNamespace: argocd
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: argocd-secret-reader

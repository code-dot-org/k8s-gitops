{{- $config := required "codeai_cluster_config is required" (index .Values "codeai_cluster_config") -}}
{{- $clusterRegion := .Values.sharedResources.clusterRegion | default (required "codeai_cluster_config.cluster_region is required" (index $config "cluster_region")) -}}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager-store-kargo-shared-resources
  namespace: {{ .Values.sharedResources.namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ $clusterRegion | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa-kargo-shared-resources

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager-store-kargo-shared-resources
  namespace: {{ .Values.sharedResources.namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.sharedResources.clusterRegion | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa-kargo-shared-resources

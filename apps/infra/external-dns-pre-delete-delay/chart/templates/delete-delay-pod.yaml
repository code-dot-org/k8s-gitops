apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  terminationGracePeriodSeconds: {{ add .Values.preStopSleepSeconds 60 }}
  containers:
    - name: sleeper
      image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
      lifecycle:
        preStop:
          exec:
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                echo "external-dns-pre-delete-delay: sleeping for {{ .Values.preStopSleepSeconds }}s before pod exit"
                sleep {{ .Values.preStopSleepSeconds }}
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          trap 'exit 0' TERM INT
          while true; do
            sleep 3600
          done

apiVersion: v1
kind: ServiceAccount
metadata:
  name: crossplane-postsync-health-hook
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-postsync-health-hook
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: ["pkg.crossplane.io"]
    resources: ["providers", "functions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-postsync-health-hook
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
subjects:
  - kind: ServiceAccount
    name: crossplane-postsync-health-hook
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-postsync-health-hook
---
apiVersion: batch/v1
kind: Job
metadata:
  name: crossplane-postsync-health-hook
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: crossplane-postsync-health-hook
      restartPolicy: Never
      containers:
        - name: wait
          image: bitnami/kubectl:1.32.2
          command:
            - /bin/sh
            - -ceu
            - |
              wait_until_healthy() {
                kubectl wait --for=jsonpath='{.status.conditions[?(@.type=="Healthy")].status}'=True "$1.pkg.crossplane.io/$2" --timeout=15m
              }

              wait_until_healthy function function-auto-ready
              wait_until_healthy function function-go-templating
              {{- range $key, $provider := .Values.provider.aws }}
              {{- if and (kindIs "map" $provider) ($provider.enabled | default false) }}
              wait_until_healthy provider {{ if eq $key "family" }}upbound-provider-family-aws{{ else }}provider-aws-{{ $key }}{{ end }}
              {{- end }}
              {{- end }}

apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: "provider-aws"
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
            - name: package-runtime
              resources:
                requests:
                  cpu: 500m
                  memory: 768Mi
                limits:
                  cpu: 500m
                  memory: 768Mi
  serviceAccountTemplate:
    metadata:
      name: "provider-aws"
      annotations:
        eks.amazonaws.com/role-arn: {{ required "crossplane.providers.aws.iamRoleArn is required" .Values.crossplane.providers.aws.iamRoleArn | quote }}

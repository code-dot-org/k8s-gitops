apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mimic-leaf
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/code-dot-org/k8s-gitops.git
    targetRevision: main
    path: mimic/apps/leaf/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: leaf-generated
  syncPolicy:
    managedNamespaceMetadata:
      annotations:
        argocd.argoproj.io/tracking-id: "mimic-leaf:/Namespace:/leaf-generated"
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
